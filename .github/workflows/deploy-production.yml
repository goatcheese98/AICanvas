name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Deploy everything or a single surface
        required: true
        default: all
        type: choice
        options:
          - all
          - api
          - web
          - partykit
      run_validate:
        description: Run validate before deploy
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    if: ${{ github.event_name == 'push' || github.event.inputs.run_validate == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun and Turbo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  deploy-api:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    needs: validate
    if: >-
      ${{
        always() &&
        (github.event_name == 'push' ||
          github.event.inputs.deploy_target == 'all' ||
          github.event.inputs.deploy_target == 'api') &&
        (needs.validate.result == 'success' || needs.validate.result == 'skipped')
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun and Turbo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Sync API secrets
        working-directory: apps/api
        env:
          CLOUDFLARE_ACCOUNT_ID: 17ca93f20835664505fe44e9d514c34e
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY }}
        run: |
          printf '%s' "$CLERK_SECRET_KEY" | npx wrangler secret put CLERK_SECRET_KEY
          printf '%s' "$CLERK_JWT_KEY" | npx wrangler secret put CLERK_JWT_KEY

      - name: Deploy API Worker
        working-directory: apps/api
        env:
          CLOUDFLARE_ACCOUNT_ID: 17ca93f20835664505fe44e9d514c34e
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >-
          npx wrangler deploy
          --var ENVIRONMENT:production
          --var CLERK_PUBLISHABLE_KEY:${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
          --var CORS_ALLOWED_ORIGINS:https://roopstudio.com,https://www.roopstudio.com,http://localhost:5173,http://127.0.0.1:5173
          --var SENTRY_RELEASE:${{ github.sha }}
          --var SENTRY_TRACES_SAMPLE_RATE:${{ vars.SENTRY_TRACES_SAMPLE_RATE || '0.1' }}

  deploy-web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    needs: validate
    if: >-
      ${{
        always() &&
        (github.event_name == 'push' ||
          github.event.inputs.deploy_target == 'all' ||
          github.event.inputs.deploy_target == 'web') &&
        (needs.validate.result == 'success' || needs.validate.result == 'skipped')
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun and Turbo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Web App
        working-directory: apps/web
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_PARTYKIT_HOST: ${{ vars.VITE_PARTYKIT_HOST }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: ${{ vars.VITE_SENTRY_ENVIRONMENT || 'production' }}
          VITE_SENTRY_RELEASE: ${{ github.sha }}
          VITE_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE || '0.1' }}
          VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE: ${{ vars.VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE || '0.02' }}
          VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE: ${{ vars.VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE || '1.0' }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: bun run build

      - name: Deploy Web App to Pages
        working-directory: apps/web
        env:
          CLOUDFLARE_ACCOUNT_ID: 17ca93f20835664505fe44e9d514c34e
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: >-
          bunx wrangler pages deploy dist
          --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }}
          --branch=main

  deploy-partykit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    needs: validate
    if: >-
      ${{
        always() &&
        (github.event_name == 'push' ||
          github.event.inputs.deploy_target == 'all' ||
          github.event.inputs.deploy_target == 'partykit') &&
        (needs.validate.result == 'success' || needs.validate.result == 'skipped')
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun and Turbo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Deploy PartyKit
        working-directory: workers/partykit
        env:
          PARTYKIT_LOGIN: ${{ secrets.PARTYKIT_LOGIN }}
          PARTYKIT_TEAM: ${{ vars.PARTYKIT_TEAM }}
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
        run: npx partykit deploy -c partykit.json

  smoke-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    needs:
      - deploy-api
      - deploy-web
      - deploy-partykit
    if: >-
      ${{
        always() &&
        (github.event_name == 'push' || github.event.inputs.deploy_target == 'all') &&
        (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped') &&
        (needs.deploy-web.result == 'success' || needs.deploy-web.result == 'skipped') &&
        (needs.deploy-partykit.result == 'success' || needs.deploy-partykit.result == 'skipped')
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun and Turbo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Run smoke checks
        env:
          DEPLOY_API_URL: ${{ vars.DEPLOY_API_URL }}
          DEPLOY_PARTYKIT_HOST: ${{ vars.DEPLOY_PARTYKIT_HOST }}
          DEPLOY_WEB_URL: ${{ vars.DEPLOY_WEB_URL }}
        run: bun run smoke:deploy
