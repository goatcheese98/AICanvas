name = "ai-canvas-api"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
# ANTHROPIC_TEXT_MODEL = "claude-3-5-haiku-latest"
# ANTHROPIC_API_BASE_URL = "https://api.anthropic.com"
# OPENROUTER_TEXT_MODEL = "anthropic/claude-3.7-sonnet"
# OPENROUTER_TOOL_MODEL = "openai/gpt-4.1"
# OPENROUTER_IMAGE_MODEL = "google/gemini-2.5-flash-image-preview"
# OPENROUTER_API_BASE_URL = "https://openrouter.ai/api/v1"
# VECTORIZE_ASSET_URL = "https://your-vectorize-service.example.com/run"

[[d1_databases]]
binding = "DB"
database_name = "ai-canvas-db"
database_id = "placeholder-replace-with-actual-id"
migrations_dir = "drizzle"

[[r2_buckets]]
binding = "R2"
bucket_name = "ai-canvas-storage"

# [env.production]
# [env.production.vars]
# ENVIRONMENT = "production"
