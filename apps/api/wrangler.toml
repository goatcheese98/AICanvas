name = "ai-canvas-api"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

[observability]
enabled = true

  [observability.logs]
  invocation_logs = true
  head_sampling_rate = 1

  [observability.traces]
  enabled = true
  head_sampling_rate = 0.1

[vars]
ENVIRONMENT = "development"
CORS_ALLOWED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,http://localhost:5176,http://127.0.0.1:5176,https://roopstudio.com,https://www.roopstudio.com"
# CLERK_PUBLISHABLE_KEY = "pk_test_xxx"
# SENTRY_DSN = "https://examplePublicKey@o0.ingest.sentry.io/0"
# SENTRY_RELEASE = "local-dev"
# SENTRY_TRACES_SAMPLE_RATE = "1.0"
# ANTHROPIC_TEXT_MODEL = "claude-3-5-haiku-latest"
# ANTHROPIC_API_BASE_URL = "https://api.anthropic.com"
# OPENROUTER_TEXT_MODEL = "anthropic/claude-3.7-sonnet"
# OPENROUTER_TOOL_MODEL = "openai/gpt-4.1"
# OPENROUTER_IMAGE_MODEL = "google/gemini-2.5-flash-image-preview"
# OPENROUTER_API_BASE_URL = "https://openrouter.ai/api/v1"
# VECTORIZE_ASSET_URL = "https://your-vectorize-service.example.com/run"

[[d1_databases]]
binding = "DB"
database_name = "ai-canvas-db"
database_id = "fd841335-ff7a-4d9f-92e8-97102d4b0621"
migrations_dir = "drizzle"

[[r2_buckets]]
binding = "R2"
bucket_name = "ai-canvas-storage"

# [env.production]
# [env.production.vars]
# ENVIRONMENT = "production"
